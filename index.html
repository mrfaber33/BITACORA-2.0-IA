<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#121922;
      --panel-2:#18222e;
      --border:#243243;
      --text:#e8f0f7;
      --muted:#91a2b6;
      --green:#1eea8a;
      --red:#ff5f7a;
      --gold:#f4c35a;
      --blue:#57b4ff;
      --purple:#b57fff;
      --orange:#ff9f43;
      --chip:#0f1620;
      --shadow:0 10px 25px rgba(0,0,0,.28);
      --radius:16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,#091019 0%, #0b0f14 100%);
      color:var(--text);
    }
    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:24px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .logo{
      width:42px;
      height:42px;
      border-radius:12px;
      object-fit:cover;
      box-shadow:0 0 20px rgba(244,195,90,.25);
    }
    .brand h1{
      margin:0;
      font-size:28px;
      letter-spacing:.4px;
    }
    .brand small{
      display:block;
      color:var(--muted);
      margin-top:2px;
    }
    .pro-badge{
      background:linear-gradient(135deg, var(--gold), var(--orange));
      color:#000;
      font-size:11px;
      font-weight:900;
      padding:4px 8px;
      border-radius:6px;
      margin-left:8px;
      letter-spacing:.5px;
    }
    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .tab{
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      transition:all .2s;
    }
    .tab:hover{
      border-color:#3c536c;
    }
    .tab.active{
      background:linear-gradient(180deg,#1b2735,#111b26);
      border-color:#3c536c;
      box-shadow:var(--shadow);
    }
    .grid-metrics{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:14px;
      margin-bottom:18px;
    }
